name: CI — Tests & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff

      - name: Lint with Ruff
        run: |
          ruff check backend/ mcp_server/ tests/ --select E,F,W --ignore E501

      - name: Run unit tests (no API key required)
        env:
          LLM_MODEL: llama3-8b-8192
        run: |
          python -m pytest tests/test_graph.py tests/test_api.py -v --tb=short

      - name: Run integration tests (if GROQ_API_KEY is set)
        if: env.GROQ_API_KEY != ''
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_MODEL: llama3-8b-8192
        run: |
          python -m pytest tests/ -v --tb=short
