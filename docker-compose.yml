version: "3.9"

services:
  mcp-server:
    build: .
    container_name: sma-mcp-server
    command: python -m uvicorn mcp_server.server:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: .
    container_name: sma-backend
    command: python -m uvicorn backend.app.api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MCP_SERVER_HOST=mcp-server
      - MCP_SERVER_PORT=8001
    volumes:
      - db-data:/app/data
    depends_on:
      mcp-server:
        condition: service_healthy

  frontend:
    build: .
    container_name: sma-frontend
    command: python -m streamlit run frontend/app.py --server.port 8501 --server.headless true --browser.gatherUsageStats false
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  db-data:
